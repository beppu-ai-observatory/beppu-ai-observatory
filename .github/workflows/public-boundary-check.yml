name: Public repository boundary check

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: public-repository-boundary-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-public-boundary:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out the candidate public tree without credentials
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Reject private files, private schemas, URLs, and secret literals
        run: python public_boundary_check.py --history

      - name: Run boundary policy tests
        run: python -m unittest discover -s tests
